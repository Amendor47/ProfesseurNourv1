<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="preview.css">
<style>
  .sw{ display:flex; flex-direction:column; gap:0; border-radius:10px; overflow:hidden;
    border:1px solid rgba(255,255,255,.1); flex:1; min-width:120px; }
  .chip{ height:64px; }
  .meta{ padding:7px 9px; background:rgba(0,0,0,.25); }
  .nm{ font-family:var(--serif); font-size:13px; color:var(--cream); }
  .hex{ font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.5px; }
</style></head>
<body><div class="card-inner">
  <div class="lbl" style="margin-bottom:12px;">Warm · Lou — <span class="amber">the streamer</span></div>
  <div class="row" style="gap:10px;">
    <div class="sw"><div class="chip" style="background:#d8693b"></div><div class="meta"><div class="nm">burnt orange</div><div class="hex">#d8693b · primary warm</div></div></div>
    <div class="sw"><div class="chip" style="background:#f2c14e"></div><div class="meta"><div class="nm">amber</div><div class="hex">#f2c14e · accent</div></div></div>
    <div class="sw"><div class="chip" style="background:#e0a3a3"></div><div class="meta"><div class="nm">dusty pink</div><div class="hex">#e0a3a3 · français</div></div></div>
    <div class="sw"><div class="chip" style="background:#f4ead5"></div><div class="meta"><div class="nm">cream</div><div class="hex">#f4ead5 · headings</div></div></div>
  </div>
</div></body></html>
