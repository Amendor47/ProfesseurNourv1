<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="preview.css">
<style>
  .sw{ display:flex; flex-direction:column; gap:0; border-radius:10px; overflow:hidden;
    border:1px solid rgba(255,255,255,.12); flex:1; min-width:130px; }
  .chip{ height:64px; }
  .meta{ padding:7px 9px; background:rgba(0,0,0,.3); }
  .nm{ font-family:var(--serif); font-size:13px; color:var(--cream); }
  .hex{ font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.5px; }
</style></head>
<body><div class="card-inner">
  <div class="lbl" style="margin-bottom:6px;">In-engine warm — pixel characters &amp; canvas HUD</div>
  <div style="font-family:var(--serif); font-style:italic; font-size:12px; color:var(--muted); margin-bottom:12px;">A hotter warm pair used only inside the playable build.</div>
  <div class="row" style="gap:10px;">
    <div class="sw"><div class="chip" style="background:#E87D9A"></div><div class="meta"><div class="nm">hoodie pink</div><div class="hex">#E87D9A · Lou's hoodie</div></div></div>
    <div class="sw"><div class="chip" style="background:#F5D03B"></div><div class="meta"><div class="nm">gold</div><div class="hex">#F5D03B · HUD / hearts</div></div></div>
    <div class="sw"><div class="chip" style="background:#8B4513"></div><div class="meta"><div class="nm">monkey fur</div><div class="hex">#8B4513 · Elias-singe</div></div></div>
    <div class="sw"><div class="chip" style="background:#5b6b86"></div><div class="meta"><div class="nm">elias hoodie</div><div class="hex">#5b6b86 · cold blue</div></div></div>
  </div>
</div></body></html>
