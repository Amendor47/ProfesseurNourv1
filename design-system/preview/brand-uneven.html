<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="preview.css">
<style>
  .stat{ display:flex; gap:18px; align-items:center; }
  .who{ flex:1; }
  .nm{ font-family:var(--mono); font-size:13px; letter-spacing:.5px; margin-bottom:3px; }
  .h{ font-family:var(--serif); font-size:13px; color:var(--muted); font-style:italic; }
  .lou .nm{ color:var(--burnt-orange); } .eli .nm{ color:var(--nordic-blue); }
  .heart{ font-size:30px; } 
  .blend{ flex:none; width:7px; height:62px; border-radius:4px;
    background:linear-gradient(180deg,#d8693b,#f2c14e 35%,#b8b0cf 65%,#6e93bd); }
</style></head>
<body><div class="card-inner">
  <div class="lbl" style="margin-bottom:14px;">The love is uneven — pillar four, made literal</div>
  <div class="stat">
    <div class="blend"></div>
    <div class="who lou"><div class="nm">🎧 Lou</div><div class="h">likes him · teases him · <span style="color:var(--dusty-pink)">"singe"</span></div></div>
    <span class="heart">💙</span>
    <div class="who eli" style="text-align:right;"><div class="nm">Elias 🎮</div><div class="h">loves her · waits · sends the heart</div></div>
  </div>
</div></body></html>
