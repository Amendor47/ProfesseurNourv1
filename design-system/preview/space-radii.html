<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="preview.css">
<style>

    padding-bottom:8px; width:96px; height:74px; }
  .t{ font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.5px; }
  .col{ display:flex; flex-direction:column; align-items:center; gap:7px; }

<body><div class="card-inner">

    <div class="col"><div class="b" style="border-radius:14px;"><span class="t">14</span></div><span class="t">md · cards</span></div>

    <div class="col"><div class="b" style="border-radius:9px;"><span class="t">9</span></div><span class="t">button</span></div>

  </div>
