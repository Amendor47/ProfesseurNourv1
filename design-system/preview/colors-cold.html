<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="preview.css">
<style>
  .sw{ display:flex; flex-direction:column; gap:0; border-radius:10px; overflow:hidden;
    border:1px solid rgba(255,255,255,.1); flex:1; min-width:120px; }
  .chip{ height:64px; }
  .meta{ padding:7px 9px; background:rgba(0,0,0,.25); }
  .nm{ font-family:var(--serif); font-size:13px; color:var(--cream); }
  .hex{ font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.5px; }
</style></head>
<body><div class="card-inner">
  <div class="lbl" style="margin-bottom:12px;">Cold · Elias — <span style="color:var(--nordic-blue)">the lurker</span></div>
  <div class="row" style="gap:10px;">
    <div class="sw"><div class="chip" style="background:#6e93bd"></div><div class="meta"><div class="nm">nordic blue</div><div class="hex">#6e93bd · primary cold</div></div></div>
    <div class="sw"><div class="chip" style="background:#cdd6dd"></div><div class="meta"><div class="nm">snow gray</div><div class="hex">#cdd6dd · cold light</div></div></div>
    <div class="sw"><div class="chip" style="background:#b8b0cf"></div><div class="meta"><div class="nm">lavender</div><div class="hex">#b8b0cf · svenska</div></div></div>
  </div>
</div></body></html>
