<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="preview.css">
<style>
  .grid{ display:flex; flex-wrap:wrap; gap:8px; }
  .ic{ width:52px; height:52px; border-radius:11px; background:var(--paper-2); border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; }
  .g{ font-size:22px; line-height:1; }
  .n{ font-family:var(--mono); font-size:7.5px; color:var(--muted); letter-spacing:.3px; }
  .mono-marks{ font-family:var(--mono); color:var(--amber); font-size:20px; }
</style></head>
<body><div class="card-inner">
  <div class="lbl" style="margin-bottom:6px;">Iconography — emoji + mono glyphs, never SVG</div>
  <div style="font-family:var(--serif);font-style:italic;font-size:12px;color:var(--muted);margin-bottom:12px;">One per slot, at intent — never decorative rows.</div>
  <div class="grid">
    <div class="ic"><span class="g">🎧</span><span class="n">stream</span></div>
    <div class="ic"><span class="g">🎮</span><span class="n">play</span></div>
    <div class="ic"><span class="g">📶</span><span class="n">connexion</span></div>
    <div class="ic"><span class="g">📞</span><span class="n">the call</span></div>
    <div class="ic"><span class="g">🧩</span><span class="n">decode</span></div>
    <div class="ic"><span class="g">📱</span><span class="n">text duel</span></div>
    <div class="ic"><span class="g">🐒</span><span class="n">singe</span></div>
    <div class="ic"><span class="g">💙</span><span class="n">the heart</span></div>
    <div class="ic"><span class="g">🐈‍⬛</span><span class="n">baudelaire</span></div>
    <div class="ic"><span class="g">🔥</span><span class="n">end · warm</span></div>
    <div class="ic"><span class="g">❄</span><span class="n">end · cold</span></div>
    <div class="ic"><span class="g">🥀</span><span class="n">end · honest</span></div>
    <div class="ic"><span class="g mono-marks">↗</span><span class="n">open</span></div>
    <div class="ic"><span class="g mono-marks">●</span><span class="n">live</span></div>
    <div class="ic"><span class="g mono-marks">▲▼</span><span class="n">meter</span></div>
  </div>
</div></body></html>
