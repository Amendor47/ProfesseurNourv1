<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="preview.css">
<style>
  .chip{ display:inline-block; font-family:var(--mono); font-size:11px; letter-spacing:.5px;
    padding:4px 11px; border-radius:20px; border:1px solid var(--line); color:var(--snow-gray);
    background:rgba(255,255,255,.03); }
  .chip.warm{ border-color:rgba(216,105,59,.5); color:var(--burnt-orange); }
  .chip.cold{ border-color:rgba(110,147,189,.5); color:var(--nordic-blue); }
  .chip.amber{ border-color:rgba(242,193,78,.5); color:var(--amber); }
</style></head>
<body><div class="card-inner">
  <div class="lbl" style="margin-bottom:14px;">Chips — neutral · warm · cold</div>
  <div class="row" style="gap:9px;">
    <span class="chip warm">RUNNER · race 1</span>
    <span class="chip">MONKEY FIGHT 1</span>
    <span class="chip cold">CHOICE · send the heart</span>
    <span class="chip cold">SILENT CALL</span>
    <span class="chip amber">DECODE QUIZ</span>
    <span class="chip warm">STREAM OVERSHARE</span>
    <span class="chip">TEXT DUEL · delete</span>
  </div>
</div></body></html>
