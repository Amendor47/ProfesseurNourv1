<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="preview.css">
<style>
  .card{ background:var(--paper-2); border:1px solid var(--line); border-radius:14px; padding:20px 18px; max-width:300px; }
  .ci{ font-size:26px; margin-bottom:9px; }
  .meta{ font-family:var(--mono); font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--amber); margin-bottom:8px; }
  .card h4{ font-family:var(--serif); font-size:18px; color:var(--cream); font-weight:600; margin-bottom:7px; }
  .card p{ font-family:var(--serif); font-size:14.5px; color:var(--muted); line-height:1.55; margin:0; }
  .metaphor{ margin-top:10px; font-family:var(--serif); font-style:italic; color:var(--dusty-pink); font-size:13.5px; }
</style></head>
<body><div class="card-inner">
  <div class="lbl" style="margin-bottom:12px;">Card — meta · title · body · metaphor</div>
  <div class="card">
    <div class="ci">📶</div>
    <div class="meta">the spine</div>
    <h4>The Connexion Meter</h4>
    <p>One hidden 0&ndash;100 value drives the warm&harr;cold blend in real time, and writes the ending.</p>
    <div class="metaphor">how close you actually are, made visible.</div>
  </div>
</div></body></html>
