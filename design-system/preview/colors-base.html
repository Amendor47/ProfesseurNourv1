<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="preview.css">
<style>
  .sw{ display:flex; flex-direction:column; gap:0; border-radius:10px; overflow:hidden;
    border:1px solid rgba(255,255,255,.12); flex:1; min-width:108px; }
  .chip{ height:60px; }
  .meta{ padding:7px 9px; background:rgba(0,0,0,.3); }
  .nm{ font-family:var(--serif); font-size:13px; color:var(--cream); }
  .hex{ font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.5px; }
</style></head>
<body><div class="card-inner">
  <div class="lbl" style="margin-bottom:12px;">Base · near-black paper &amp; text</div>
  <div class="row" style="gap:10px;">
    <div class="sw"><div class="chip" style="background:#08070c"></div><div class="meta"><div class="nm">night</div><div class="hex">#08070c · canvas void</div></div></div>
    <div class="sw"><div class="chip" style="background:#0d0b12"></div><div class="meta"><div class="nm">paper</div><div class="hex">#0d0b12 · page bg</div></div></div>
    <div class="sw"><div class="chip" style="background:#14101a"></div><div class="meta"><div class="nm">surface</div><div class="hex">#14101a · cards</div></div></div>
    <div class="sw"><div class="chip" style="background:#e3d6bf"></div><div class="meta"><div class="nm">body</div><div class="hex">#e3d6bf · text</div></div></div>
    <div class="sw"><div class="chip" style="background:#9a8f9b"></div><div class="meta"><div class="nm">muted</div><div class="hex">#9a8f9b · captions</div></div></div>
  </div>
</div></body></html>
