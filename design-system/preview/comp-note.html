<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="preview.css">
<style>
  .note{ border:1px dashed rgba(242,193,78,.4); background:rgba(242,193,78,.05);
    border-radius:14px; padding:18px 20px; max-width:600px; }
  .nl{ font-family:var(--mono); font-size:11px; letter-spacing:1.5px; color:var(--amber);
    text-transform:uppercase; margin-bottom:8px; }
  .note p{ font-family:var(--serif); font-size:15px; color:#d9ccba; line-height:1.6; margin:0; }
  .fr{ color:var(--dusty-pink); font-style:italic; } em{ color:var(--cream); font-style:italic; }
</style></head>
<body><div class="card-inner">
  <div class="lbl" style="margin-bottom:12px;">Designer note — dashed amber callout</div>
  <div class="note">
    <div class="nl">The title, decoded</div>
    <p><span class="fr">"Singe"</span> is Lou's pet name for Elias. He doesn't like it — he answers to it anyway. The whole game lives in that gap: <em>the things we accept from people who love us less than we love them.</em></p>
  </div>
</div></body></html>
