<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>When You Call Me, Singe — Run, Loupiote</title>
<style>
  :root{ --warm:#E87D9A; --gold:#F5D03B; --cold:#6e93bd; --ink:#0c0a14; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#08070d;overflow:hidden;
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 30%,#1a1430,#08070d 75%);}
  #game{display:block;background:#0d0b12;
    box-shadow:0 0 60px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.05);
    image-rendering:auto;touch-action:none;border-radius:6px;}
  /* CRT scanlines + vignette + flicker, on every surface */
  #crt{position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.10) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;animation:flicker 7s infinite;}
  #crt::after{content:"";position:absolute;inset:0;
    background:radial-gradient(ellipse at center, transparent 56%, rgba(0,0,0,.55) 100%);}
  @keyframes flicker{0%,100%{opacity:.9}50%{opacity:.74}}
  #pad{position:fixed;left:0;right:0;bottom:10px;z-index:40;text-align:center;
    color:#cdd6dd;font-size:12px;letter-spacing:1px;opacity:.5;display:none;}
  #pad.on{display:block;}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="900" height="500"></canvas></div>
<div id="crt"></div>
<div id="pad">swipe ◀ ▶ lanes · ▲ jump · ▼ slide</div>
<script>
/* ============================================================================
   WHEN YOU CALL ME, SINGE — "Run, Loupiote"
   A Subway-Surfers-style 3-lane endless runner. Lou sprints into the screen;
   ELIAS chases from behind and closes the gap every time she stumbles. Dodge
   obstacles, collect ❤ (connexion) and ☕ (speed), keep your lead. Pure HTML5
   Canvas + vanilla JS, single file. Two climates, one blend; the love is uneven.
   ============================================================================ */
(function(){
'use strict';
const DEBUG = false;

/* ----------------------------------------------------------------- canvas -- */
const CW = 900, CH = 500;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function fitCanvas(){
  const m = 16;
  const s = Math.min((window.innerWidth - m)/CW, (window.innerHeight - m)/CH, 1.6);
  canvas.style.width  = Math.round(CW*s)+'px';
  canvas.style.height = Math.round(CH*s)+'px';
}
window.addEventListener('resize', fitCanvas); fitCanvas();

const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (isTouch) document.getElementById('pad').classList.add('on');

/* ----------------------------------------------------------------- utils --- */
const TAU = Math.PI*2;
const rand  = (a,b)=>a+Math.random()*(b-a);
const clamp = (v,a,b)=>v<a?a:v>b?b:v;
const lerp  = (a,b,t)=>a+(b-a)*t;
const choice= a=>a[(Math.random()*a.length)|0];

/* --------------------------------------------------------------- storage --- */
const Store = {
  data:(()=>{ try{return JSON.parse(localStorage.getItem('wycm.run')||'{}');}catch(e){return {};} })(),
  save(){ try{localStorage.setItem('wycm.run',JSON.stringify(this.data));}catch(e){} },
  get best(){ return this.data.best||0; },
  set best(v){ this.data.best=v; this.save(); }
};

/* ----------------------------------------------------------------- audio --- */
const Audio2 = (()=>{
  let ac=null; const get=()=>ac||(ac=new (window.AudioContext||window.webkitAudioContext)());
  function blip(freq,dur,type='square',vol=.12){
    try{ const c=get(); const o=c.createOscillator(),g=c.createGain();
      o.type=type; o.frequency.value=freq; o.connect(g); g.connect(c.destination);
      const t=c.currentTime; g.gain.setValueAtTime(vol,t);
      g.gain.exponentialRampToValueAtTime(.0001,t+dur);
      o.start(t); o.stop(t+dur);
    }catch(e){}
  }
  return {
    jump(){ blip(540,.12,'square'); },
    lane(){ blip(360,.06,'triangle',.08); },
    coin(){ blip(880,.09,'sine',.14); blip(1320,.08,'sine',.10); },
    heart(){ blip(660,.12,'sine',.16); blip(990,.14,'sine',.12); },
    hit(){ blip(150,.22,'sawtooth',.18); },
    caught(){ blip(110,.5,'sawtooth',.2); }
  };
})();

/* ------------------------------------------------------------ perspective -- */
/* world z = distance ahead of Lou. z=0 is her plane; +z runs to the horizon.
   Camera sits behind her, so the chaser lives near z=0 in the foreground. */
const camD       = 380;
const horizonY   = CH*0.30;
const groundNearY= CH*0.82;
const laneSpread = CW*0.205;
const zSpawn     = 1050;
const LANES      = [-1,0,1];
function project(z, lane){
  const sc = camD/Math.max(40, z+camD);
  return { x: CW/2 + lane*laneSpread*sc,
           y: horizonY + (groundNearY-horizonY)*sc,
           s: sc };
}

/* ----------------------------------------------------------- round-rect --- */
function rr(x,y,w,h,r){ r=Math.min(r,Math.abs(w)/2,Math.abs(h)/2);
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

/* ------------------------------------------------------------- characters -- */
/* Drawn from BEHIND (both run away from camera) — intimacy carried by colour,
   never literal faces. Lou: pink hoodie, brown curls. Elias: blue hoodie, blond. */
function drawRunner(cx, feetY, s, who, phase, pose){
  const lou = who==='lou';
  const hood = lou ? '#E87D9A' : '#6e93bd';
  const hoodDk = lou ? '#c85f7d' : '#557399';
  const hair = lou ? '#4a2f20' : '#e7d49a';
  const pants= lou ? '#2a2733' : '#33405e';
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.32)';
  ctx.beginPath(); ctx.ellipse(cx, feetY+3, 24*s, 7*s, 0,0,TAU); ctx.fill();

  if(pose==='slide'){
    const w=46*s,h=24*s, y=feetY-h*0.5;
    ctx.fillStyle=pants; rr(cx-w*0.5, y+h*0.5, w*0.5, h*0.5, 4*s); ctx.fill();
    ctx.fillStyle=hood;  rr(cx-w*0.5, y, w, h*0.7, 6*s); ctx.fill();
    ctx.fillStyle=hair;  ctx.beginPath(); ctx.arc(cx+w*0.4, y+h*0.3, 9*s,0,TAU); ctx.fill();
    ctx.restore(); return;
  }

  const swing = pose==='jump' ? 0 : Math.sin(phase)*7*s;
  const bob   = pose==='jump' ? 0 : Math.abs(Math.cos(phase))*1.5*s;
  const fy = feetY - bob;
  ctx.fillStyle=pants;
  rr(cx-9*s, fy-26*s, 8*s, 26*s+ (pose==='jump'?-6*s:swing), 3*s); ctx.fill();
  rr(cx+1*s, fy-26*s, 8*s, 26*s+ (pose==='jump'?-6*s:-swing), 3*s); ctx.fill();
  const bh=40*s, bw=30*s, by=fy-26*s-bh;
  ctx.fillStyle=hood; rr(cx-bw*0.5, by, bw, bh, 7*s); ctx.fill();
  ctx.fillStyle=hoodDk; rr(cx-bw*0.5, by, bw, 7*s, 6*s); ctx.fill();
  ctx.fillStyle=hood;
  rr(cx-bw*0.5-5*s, by+8*s, 6*s, 22*s+ (pose==='jump'?-8*s:-swing*0.6),3*s); ctx.fill();
  rr(cx+bw*0.5-1*s, by+8*s, 6*s, 22*s+ (pose==='jump'?-8*s: swing*0.6),3*s); ctx.fill();
  const hr=12*s, hy=by-hr*0.7;
  ctx.fillStyle='#caa07e'; ctx.beginPath(); ctx.arc(cx, hy, hr*0.78,0,TAU); ctx.fill();
  ctx.fillStyle=hair;
  if(lou){
    ctx.beginPath(); ctx.arc(cx, hy-2*s, hr,0,TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(cx-7*s, hy+2*s, 5*s,0,TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+7*s, hy+2*s, 5*s,0,TAU); ctx.fill();
    ctx.fillStyle='#3a241a'; rr(cx-3*s, hy+hr*0.5, 6*s, 16*s, 3*s); ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(cx, hy-2*s, hr,0,TAU); ctx.fill();
    ctx.fillStyle='#d9c47e'; rr(cx-hr, hy-4*s, hr*1.4, 8*s, 3*s); ctx.fill();
  }
  ctx.restore();
}

/* ------------------------------------------------------------------ game --- */
const ST = { TITLE:'title', PLAY:'play', OVER:'over' };

/* obstacle archetypes — each maps to a Subway-Surfers verb */
const OBST = {
  low:  { h:28, col:'#7a5a3a', clear:'jump'  },  // jump over (book stack / IKEA box)
  high: { h:18, col:'#9a8f9b', clear:'slide' },  // slide under (overhead sign)
  train:{ h:64, col:'#445',    clear:'lane'  }   // change lane (tram car)
};

class Game {
  constructor(){
    this.state = ST.TITLE; this.t = 0; this.reset();
    this.bindKeys(); this.bindTouch();
    canvas.addEventListener('pointerdown', ()=>this.onTap());
  }
  reset(){
    this.lane=0; this.x=0;
    this.jy=0; this.vy=0; this.onGround=true;
    this.slide=0; this.phase=0;
    this.speed=300; this.dist=0;
    this.connexion=50; this.lead=64;
    this.eX=0;
    this.obstacles=[]; this.pickups=[]; this.parts=[]; this.floats=[];
    this.spawnAcc=0; this.shake=0; this.flash=0; this.audienceFlash=0;
    this.ending=null;
  }
  /* ---- input ---- */
  bindKeys(){
    addEventListener('keydown', e=>{
      const k=e.key.toLowerCase();
      if(this.state!==ST.PLAY){ if(k===' '||k==='enter') this.start(); return; }
      if(k==='arrowleft'||k==='a') this.move(-1);
      else if(k==='arrowright'||k==='d') this.move(1);
      else if(k==='arrowup'||k==='w'||k===' ') this.jump();
      else if(k==='arrowdown'||k==='s') this.doSlide();
      if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
    });
  }
  bindTouch(){
    let sx=0,sy=0;
    canvas.addEventListener('touchstart',e=>{ const t=e.changedTouches[0]; sx=t.clientX; sy=t.clientY; },{passive:true});
    canvas.addEventListener('touchend',e=>{
      const t=e.changedTouches[0]; const dx=t.clientX-sx, dy=t.clientY-sy;
      if(Math.hypot(dx,dy)<24){ if(this.state!==ST.PLAY) this.start(); else this.jump(); return; }
      if(Math.abs(dx)>Math.abs(dy)) this.move(dx>0?1:-1);
      else if(dy<0) this.jump(); else this.doSlide();
    },{passive:true});
  }
  onTap(){ if(this.state!==ST.PLAY) this.start(); }
  move(d){ const n=clamp(this.lane+d,-1,1); if(n!==this.lane){ this.lane=n; Audio2.lane(); } }
  jump(){ if(this.onGround && this.slide<=0){ this.vy=620; this.onGround=false; Audio2.jump(); } }
  doSlide(){ if(this.onGround && this.slide<=0){ this.slide=0.55; } }
  start(){ if(this.state===ST.PLAY) return; this.reset(); this.state=ST.PLAY; }

  /* ---- spawning ---- */
  spawnRow(){
    const open = choice(LANES);
    LANES.forEach(L=>{
      if(L===open){ if(Math.random()<0.7) this.spawnPickup(L); return; }
      if(Math.random()<0.72){
        const type = Math.random()<0.34?'train':(Math.random()<0.5?'low':'high');
        this.obstacles.push({lane:L, z:zSpawn, type, resolved:false});
        if(type!=='train' && Math.random()<0.4) this.spawnPickup(L, type);
      }
    });
  }
  spawnPickup(lane, over){
    const heart = Math.random()<0.34;
    this.pickups.push({lane, z:zSpawn, kind:heart?'heart':'coffee', got:false, hi: over==='low'});
  }

  /* ---- update ---- */
  update(dt){
    this.t+=dt;
    if(this.state!==ST.PLAY){ this.phase+=dt*8; return; }

    this.speed = Math.min(720, 300 + this.dist*0.32);
    this.dist += this.speed*dt*0.05;
    this.phase += dt*(6 + this.speed*0.012);

    this.x = lerp(this.x, this.lane, clamp(dt*12,0,1));
    if(!this.onGround){ this.jy += this.vy*dt; this.vy -= 1800*dt;
      if(this.jy<=0){ this.jy=0; this.vy=0; this.onGround=true; } }
    if(this.slide>0) this.slide-=dt;

    this.eX = lerp(this.eX, this.lane, clamp(dt*5,0,1));
    this.lead = Math.min(64, this.lead + dt*3.2);
    if(this.lead<=0){ this.over('caught'); return; }

    this.spawnAcc += this.speed*dt;
    if(this.spawnAcc > 250){ this.spawnAcc=0; this.spawnRow(); }

    for(const o of this.obstacles){
      o.z -= this.speed*dt;
      if(!o.resolved && o.z < 12){
        o.resolved=true;
        if(o.lane===this.lane){
          const cfg=OBST[o.type];
          const safe = (cfg.clear==='jump'  && this.jy>34)
                    || (cfg.clear==='slide' && this.slide>0);
          if(!safe) this.hit(o);
          else this.floats.push({x:project(0,this.x).x, y:groundNearY-90, txt:'✓', col:'#cdd6dd', life:0.6});
        }
      }
    }
    this.obstacles = this.obstacles.filter(o=>o.z>-60);

    for(const p of this.pickups){
      p.z -= this.speed*dt;
      if(!p.got && p.z<14 && p.lane===this.lane){
        const reachable = p.hi ? (this.jy>30) : (this.slide<=0);
        if(reachable){ p.got=true; this.collect(p); }
      }
    }
    this.pickups = this.pickups.filter(p=>p.z>-40 && !p.got);

    for(const pt of this.parts){ pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vy+=600*dt; pt.life-=dt; }
    this.parts=this.parts.filter(p=>p.life>0);
    for(const f of this.floats){ f.y-=40*dt; f.life-=dt; }
    this.floats=this.floats.filter(f=>f.life>0);

    this.shake=Math.max(0,this.shake-dt*4);
    this.flash=Math.max(0,this.flash-dt*3);
    this.audienceFlash=Math.max(0,this.audienceFlash-dt*2);
  }
  hit(o){
    Audio2.hit();
    this.lead -= 19;
    this.connexion = clamp(this.connexion-4,0,100);
    this.speed *= 0.7;
    this.shake=1; this.flash=1;
    const px=project(0,this.x).x;
    this.floats.push({x:px, y:groundNearY-100, txt:choice(['trop lent !','t\'es trop','aïe']), col:'#E87D9A', life:0.9});
    for(let i=0;i<14;i++) this.parts.push({x:px,y:groundNearY-40,vx:rand(-160,160),vy:rand(-260,-40),life:rand(.3,.7),col:'#E87D9A'});
    if(this.lead<=0) this.over('caught');
  }
  collect(p){
    const px=project(0,this.x).x, py=groundNearY-90;
    if(p.kind==='heart'){ Audio2.heart(); this.connexion=clamp(this.connexion+5,0,100);
      this.lead=Math.min(64,this.lead+4);
      this.floats.push({x:px,y:py,txt:'+❤',col:'#f2c14e',life:.8}); }
    else { Audio2.coin(); this.dist+=12; this.speed=Math.min(740,this.speed+24); this.audienceFlash=1;
      this.floats.push({x:px,y:py,txt:'+☕',col:'#F5D03B',life:.8}); }
    for(let i=0;i<8;i++) this.parts.push({x:px,y:py,vx:rand(-90,90),vy:rand(-160,-20),life:rand(.25,.5),col:p.kind==='heart'?'#f2c14e':'#F5D03B'});
  }
  over(reason){
    if(this.state===ST.OVER) return;
    this.state=ST.OVER; Audio2.caught();
    this.dist|=0;
    if(this.dist>Store.best) Store.best=this.dist;
    const c=this.connexion;
    this.ending = c>=72
      ? {g:'🔥', t:'Ensemble à Stockholm', s:'She let you a little further in than she lets anyone.'}
      : c>=40
      ? {g:'❄', t:'Still figuring it out', s:'You loved unevenly and kept trying anyway.'}
      : {g:'🥀', t:'We burned beautifully', s:'Some people arrive like unfinished songs.'};
  }

  /* ---- render ---- */
  draw(){
    ctx.save();
    if(this.shake>0){ const m=this.shake*7; ctx.translate(rand(-m,m),rand(-m,m)); }
    this.drawWorld();
    if(this.state===ST.TITLE) this.drawTitle();
    if(this.state===ST.OVER)  this.drawOver();
    ctx.restore();
    if(this.flash>0){ ctx.save(); ctx.globalAlpha=this.flash*0.4; ctx.fillStyle='#E87D9A'; ctx.fillRect(0,0,CW,CH); ctx.restore(); }
  }
  drawWorld(){
    const sky=ctx.createLinearGradient(0,0,0,horizonY);
    sky.addColorStop(0,'#1a1326'); sky.addColorStop(1,'#0d0b12');
    ctx.fillStyle=sky; ctx.fillRect(0,0,CW,horizonY);
    rGlow(CW*0.16, horizonY*0.5, 360, 'rgba(216,105,59,.18)');
    rGlow(CW*0.86, CH*0.9, 420, 'rgba(110,147,189,.16)');
    ctx.fillStyle='#15111d';
    for(let i=0;i<14;i++){ const bx=i*70-((this.dist*4)%70); const bh=20+((i*53)%46);
      ctx.fillRect(bx, horizonY-bh, 46, bh); }

    const nL=project(0,-1.5).x, nR=project(0,1.5).x;
    const fL=project(zSpawn,-1.5).x, fR=project(zSpawn,1.5).x;
    const road=ctx.createLinearGradient(0,horizonY,0,groundNearY+40);
    road.addColorStop(0,'#15131c'); road.addColorStop(1,'#211c2b');
    ctx.fillStyle=road;
    ctx.beginPath(); ctx.moveTo(fL,horizonY); ctx.lineTo(fR,horizonY);
    ctx.lineTo(nR,CH); ctx.lineTo(nL,CH); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(205,214,221,.18)'; ctx.lineWidth=2;
    for(const lane of [-0.5,0.5]){
      for(let z=zSpawn; z>0; z-=120){
        const off=(this.dist*9)%120; const z0=z-off; if(z0<=0) continue;
        const a=project(z0,lane), b=project(Math.max(2,z0-60),lane);
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      }
    }
    ctx.strokeStyle='rgba(110,147,189,.25)'; ctx.lineWidth=3;
    [-1.5,1.5].forEach(L=>{ const a=project(zSpawn,L),b=project(0,L);
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); });

    const scene=[];
    for(const o of this.obstacles) scene.push({z:o.z,kind:'o',ref:o});
    for(const p of this.pickups)   scene.push({z:p.z,kind:'p',ref:p});
    scene.sort((a,b)=>b.z-a.z);
    for(const it of scene){ if(it.kind==='o') this.drawObstacle(it.ref); else this.drawPickup(it.ref); }

    const pj=project(0,this.x);
    const pose = this.slide>0?'slide':(this.onGround?'run':'jump');
    drawRunner(pj.x, groundNearY - this.jy, 1.0, 'lou', this.phase, pose);

    const lf=clamp(this.lead/64,0,1);
    const eS=lerp(1.7,0.62,lf), eY=lerp(groundNearY-6, CH+70, lf);
    const eX=CW/2 + this.eX*laneSpread*1.05;
    if(eY<CH+60) drawRunner(eX, eY, eS, 'elias', this.phase*1.05+0.6, 'run');
    if(this.state===ST.PLAY && lf<0.42){
      ctx.save(); ctx.globalAlpha=(0.42-lf); ctx.fillStyle='#6e93bd';
      ctx.font='bold 22px Trebuchet MS'; ctx.textAlign='center';
      ctx.fillText('« attends— »', eX, eY-90*eS); ctx.restore();
    }

    for(const pt of this.parts){ ctx.globalAlpha=clamp(pt.life*2,0,1); ctx.fillStyle=pt.col;
      ctx.fillRect(pt.x,pt.y,3,3); } ctx.globalAlpha=1;
    ctx.textAlign='center';
    for(const f of this.floats){ ctx.globalAlpha=clamp(f.life*1.5,0,1); ctx.fillStyle=f.col;
      ctx.font='bold 20px Trebuchet MS'; ctx.fillText(f.txt,f.x,f.y); } ctx.globalAlpha=1;

    if(this.state===ST.PLAY||this.state===ST.OVER) this.drawHUD();
    if(DEBUG) this.drawDebug();
  }
  drawObstacle(o){
    const cfg=OBST[o.type]; const j=project(o.z,o.lane);
    const w=cfg.h*1.5*j.s + (o.type==='train'?40*j.s:18*j.s);
    const h=cfg.h*j.s;
    ctx.save(); ctx.fillStyle=cfg.col; ctx.textAlign='center';
    if(o.type==='high'){
      const barY=j.y-58*j.s;
      rr(j.x-w*0.7, barY, w*1.4, h, 4*j.s); ctx.fill();
      ctx.fillStyle='#f2c14e'; ctx.font=((14*j.s)|0)+'px Trebuchet MS';
      ctx.fillText('▼ slide', j.x, barY-6*j.s);
    } else if(o.type==='train'){
      rr(j.x-w*0.5, j.y-h*2.0, w, h*2.0, 6*j.s); ctx.fill();
      ctx.fillStyle='rgba(110,147,189,.5)'; rr(j.x-w*0.35, j.y-h*1.7, w*0.7, h*0.5, 4*j.s); ctx.fill();
    } else {
      rr(j.x-w*0.5, j.y-h, w, h, 4*j.s); ctx.fill();
      ctx.fillStyle='#f2c14e'; ctx.font=((14*j.s)|0)+'px Trebuchet MS';
      ctx.fillText('▲ jump', j.x, j.y-h-6*j.s);
    }
    if(DEBUG){ ctx.strokeStyle='red'; ctx.strokeRect(j.x-w*0.5,j.y-h,w,h); }
    ctx.restore();
  }
  drawPickup(p){
    const j=project(p.z, p.lane);
    const y=j.y - (p.hi?52*j.s:24*j.s) - Math.sin(this.t*4+p.z)*3*j.s;
    ctx.save(); ctx.font=((26*j.s)|0)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor=p.kind==='heart'?'#f2c14e':'#F5D03B'; ctx.shadowBlur=12*j.s;
    ctx.fillText(p.kind==='heart'?'❤':'☕', j.x, y);
    ctx.restore(); ctx.textBaseline='alphabetic';
  }
  drawHUD(){
    ctx.save();
    ctx.font='12px JetBrains Mono, monospace'; ctx.textAlign='left'; ctx.fillStyle='#cdd6dd';
    ctx.fillText('loupiote.tv · ● LIVE', 16, 24);
    ctx.fillStyle='#f4ead5'; ctx.font='bold 22px JetBrains Mono, monospace';
    ctx.fillText((this.dist|0)+' m', 16, 50);
    ctx.fillStyle='#9a8f9b'; ctx.font='11px JetBrains Mono, monospace';
    ctx.fillText('best '+(Store.best|0), 16, 66);

    const mw=220, mx=CW-mw-16, my=20;
    ctx.fillStyle='#9a8f9b'; ctx.font='11px JetBrains Mono, monospace'; ctx.textAlign='right';
    ctx.fillText('📶 connexion '+String(this.connexion|0).padStart(2,'0')+'%', CW-16, 16);
    ctx.fillStyle='rgba(255,255,255,.08)'; rr(mx,my,mw,10,5); ctx.fill();
    const g=ctx.createLinearGradient(mx,0,mx+mw,0);
    g.addColorStop(0,'#d8693b'); g.addColorStop(.4,'#f2c14e'); g.addColorStop(.6,'#cdd6dd'); g.addColorStop(1,'#6e93bd');
    ctx.save(); rr(mx,my,mw*(this.connexion/100),10,5); ctx.clip(); ctx.fillStyle=g; ctx.fillRect(mx,my,mw,10); ctx.restore();

    const ly=38, lf=clamp(this.lead/64,0,1);
    ctx.fillStyle='#9a8f9b'; ctx.textAlign='right'; ctx.fillText('🐒 lead', CW-16, ly+9);
    ctx.fillStyle='rgba(255,255,255,.08)'; rr(mx,ly,mw,7,4); ctx.fill();
    ctx.fillStyle = lf<0.35?'#E87D9A':'#6e93bd'; rr(mx,ly,mw*lf,7,4); ctx.fill();

    if(this.audienceFlash>0){ ctx.globalAlpha=this.audienceFlash; ctx.textAlign='center';
      ctx.fillStyle='#F5D03B'; ctx.font='bold 13px JetBrains Mono, monospace';
      ctx.fillText('▲ AUDIENCE', CW/2, 24); ctx.globalAlpha=1; }
    ctx.restore();
  }
  drawDebug(){ ctx.fillStyle='#0f0'; ctx.font='10px monospace'; ctx.textAlign='left';
    ctx.fillText('lead '+this.lead.toFixed(1)+' spd '+this.speed.toFixed(0)+' obs '+this.obstacles.length, 16, CH-10); }

  drawTitle(){
    dim(.42); ctx.textAlign='center';
    ctx.fillStyle='#9a8f9b'; ctx.font='12px JetBrains Mono, monospace';
    ctx.fillText('A BILINGUAL LOVE STORY · EN · FR · SV', CW/2, CH*0.27);
    const grd=ctx.createLinearGradient(CW*0.2,0,CW*0.8,0);
    grd.addColorStop(0,'#d8693b'); grd.addColorStop(.4,'#f2c14e'); grd.addColorStop(.7,'#b8b0cf'); grd.addColorStop(1,'#6e93bd');
    ctx.fillStyle=grd; ctx.font='bold 42px JetBrains Mono, monospace';
    ctx.fillText('WHEN YOU CALL ME, SINGE', CW/2, CH*0.40);
    ctx.fillStyle='#f4ead5'; ctx.font='italic 20px Newsreader, Georgia, serif';
    ctx.fillText('run, Loupiote — he\'s right behind you.', CW/2, CH*0.50);
    ctx.fillStyle='#f2c14e'; ctx.font='bold 18px JetBrains Mono, monospace';
    ctx.fillText(blink()?'▶ TAP / SPACE TO RUN':' ', CW/2, CH*0.62);
    drawRunner(CW/2-70, CH*0.80, 1.0, 'lou', this.phase, 'run');
    drawRunner(CW/2+72, CH*0.84, 1.25, 'elias', this.phase*1.05+.6, 'run');
    ctx.fillStyle='#9a8f9b'; ctx.font='12px JetBrains Mono, monospace';
    ctx.fillText('◀ ▶ lanes   ▲ jump   ▼ slide   ·   ❤ connexion   ☕ speed', CW/2, CH*0.93);
  }
  drawOver(){
    dim(.6); ctx.textAlign='center';
    const e=this.ending||{g:'🥀',t:'',s:''};
    ctx.font='52px serif'; ctx.fillText(e.g, CW/2, CH*0.30);
    ctx.fillStyle='#f4ead5'; ctx.font='bold 32px JetBrains Mono, monospace';
    ctx.fillText(e.t, CW/2, CH*0.42);
    ctx.fillStyle='#e0a3a3'; ctx.font='italic 19px Newsreader, Georgia, serif';
    ctx.fillText(e.s, CW/2, CH*0.50);
    ctx.fillStyle='#cdd6dd'; ctx.font='15px JetBrains Mono, monospace';
    ctx.fillText('caught at '+(this.dist|0)+' m   ·   connexion '+(this.connexion|0)+'%   ·   best '+(Store.best|0), CW/2, CH*0.62);
    ctx.fillStyle='#f2c14e'; ctx.font='bold 17px JetBrains Mono, monospace';
    ctx.fillText(blink()?'▶ TAP / SPACE TO RUN AGAIN':' ', CW/2, CH*0.74);
  }
}
function rGlow(x,y,r,col){ const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,col); g.addColorStop(1,'transparent'); ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH); }
function dim(a){ ctx.fillStyle='rgba(8,7,12,'+a+')'; ctx.fillRect(0,0,CW,CH); }
function blink(){ return (performance.now()%1060)<620; }

/* ------------------------------------------------------------------ loop --- */
const game=new Game(); window.game=game;
let last=performance.now();
function frame(now){
  let dt=(now-last)/1000; last=now; if(dt>0.05) dt=0.05;
  game.update(dt); game.draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* headless smoke-test hook */
window.WYCM = { game, project, drawRunner, OBST, Store };
})();
</script>
