llm: ctransformers
ctransformers:
  # Utilise le modèle local TinyLlama inclus pour un démarrage 100% offline.
  # Le server/app.py charge déjà TinyLlama en interne; ceci harmonise /llm/run côté ctransformers.
  model: models/TinyLlama-1.1B-Chat-v1.0
  model_file: tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf
  model_type: llama
  config:
    temperature: 0.7
    max_new_tokens: 512
    gpu_layers: -1 # Utilise le maximum de couches GPU/Metal possible pour une accélération maximale
huggingface:
  model: TheBloke/Wizard-Vicuna-7B-Uncensored-HF
  device: null   # 0 pour GPU
embeddings:
  model: sentence-transformers/all-MiniLM-L6-v2
  model_kwargs:
    device: cpu   # ou cuda
vectorstore:
  backend: faiss
  path: db
rag:
  k: 4
  chunk_size: 800
  chunk_overlap: 120
  rerank: false
  # Note: Frontend supports multi-answer QCM when upstream provides multiple correct answers.
